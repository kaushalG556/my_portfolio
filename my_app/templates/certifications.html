{% extends 'base.html' %}

{% block content %}

<section class="cert-section">

    <h2 class="section-title">My Certifications</h2>

    <div class="cert-grid">
        {% for cert in certs %}
        <div class="cert-card">

            <!-- IMAGE -->
            <div class="cert-img-box">
                {% if cert.image %}
                <img src="{{ cert.image.url }}" alt="{{ cert.title }}" onclick="openModal('{{ cert.image.url }}')">

                 {% endif %} 
                
                
            </div>

            <!-- TEXT -->
            <div class="cert-content">
                <h3>{{ cert.title }}</h3>
                <p class="platform">{{ cert.platform }}</p>
                <p class="duration">{{ cert.duration }}</p>

                {% if cert.certificate_url %}
                <a href="{{ cert.certificate_url }}" target="_blank" class="btn">View Certificate</a>

                {% endif %}
            </div>

        </div>
        {% endfor %}
    </div>

</section>

<!-- MODAL -->
 </div> <!-- cert-grid end -->

</section>

<!-- ✅ SINGLE MODAL -->
<div id="imgModal" class="modal" onclick="closeModal()">
    <img id="modalImg">
</div>


<style>

/* SECTION */
.cert-section {
    padding: 60px 10%;
    text-align: center;
}

/* TITLE */
.section-title {
    font-size: 2rem;
    margin-bottom: 30px;
}
.section-title:hover{
    color: yellowgreen;
    transform: scale(1.2);
}

/* GRID */
.cert-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

/* CARD */
.cert-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
}

.cert-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 25px rgba(0,0,0,0.15);
}

/* IMAGE */
.cert-img-box {
    height: 180px;
    overflow: hidden;
}

.cert-img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: pointer;
    transition: 0.3s;
}

.cert-img-box img:hover {
    transform: scale(1.08);
}

/* CONTENT */
.cert-content {
    padding: 15px;
}

.cert-content h3 {
    font-size: 1.2rem;
}

.platform {
    color: #7c3aed;
    font-weight: 600;
}

.duration {
    font-size: 0.9rem;
    color: #555;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 14px;
    background: #7c3aed;
    color: white;
    border-radius: 6px;
    text-decoration: none;
}

.btn:hover {
    background: #ff0080;
}
/* MODAL BASE */
.modal {
    display: none;   /* always hidden */

    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.95);

    z-index: 9999;
}

/* ACTIVE STATE */
.modal.active {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* IMAGE */
.modal img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 10px;
}

.dark-mode ,
.cert-card,
.cert-content{
    background: #0f172a;
    color: #fff;
}
</style>

<script>
function openModal(src){
    const modal = document.getElementById("imgModal");
    const img = document.getElementById("modalImg");

    img.src = "";          // 🔥 reset पहले
    modal.classList.add("active");

    setTimeout(() => {
        img.src = src;     // 🔥 delay से load
    }, 50);
}

function closeModal(){
    document.getElementById("imgModal").classList.remove("active");
}
</script>

{% endblock %}
